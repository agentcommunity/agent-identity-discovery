name: Showcase DNS

on:
  pull_request:
    branches: [main, feat/aid1.1-spec, feat/next16-react19-modernization, cloudflare-migration]
    paths: ['showcase/terraform/**']
  push:
    branches: [main, feat/aid1.1-spec, feat/next16-react19-modernization, cloudflare-migration]
    paths: ['showcase/terraform/**']
  workflow_dispatch: {}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6

      - name: Cache Terraform dir
        uses: actions/cache@v5
        with:
          path: showcase/terraform/.terraform
          key: terraform-${{ hashFiles('showcase/terraform/**/*.tf') }}

      - name: Terraform Init
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform init -backend-config=""

      - name: Terraform Plan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform plan -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Terraform Apply (auto main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Terraform Apply (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"
