name: Showcase DNS

on:
  pull_request:
    branches: [main, feat/aid1.1-spec, feat/next16-react19-modernization, cloudflare-migration]
    paths: ['showcase/terraform/**']
  push:
    branches: [main, feat/aid1.1-spec, feat/next16-react19-modernization, cloudflare-migration]
    paths: ['showcase/terraform/**']
  workflow_dispatch: {}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6

      - name: Cache Terraform dir
        uses: actions/cache@v5
        with:
          path: showcase/terraform/.terraform
          key: terraform-${{ hashFiles('showcase/terraform/**/*.tf') }}

      - name: Terraform Init
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform init -backend-config=""

      # Terraform state is ephemeral on every CI run (no remote backend), so the
      # CF zone is the source of truth between runs. To make every push a clean
      # reconciliation against examples.yml, delete every existing _agent.* TXT
      # record before applying. Terraform then creates the full set fresh, in
      # exactly the shape examples.yml describes. This eliminates duplicates,
      # orphans, and content drift in one shot.
      #
      # Gated to push/manual: PR runs still do plan-only and never touch CF.
      - name: Purge stale _agent.* TXT records
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          deleted=0
          page=1
          while :; do
            resp=$(curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=TXT&per_page=100&page=$page")
            ids=$(echo "$resp" | jq -r '.result[] | select(.name | startswith("_agent.")) | .id')
            for id in $ids; do
              curl -fsS -X DELETE \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$id" > /dev/null
              deleted=$((deleted+1))
            done
            total=$(echo "$resp" | jq -r '.result_info.total_pages // 1')
            [ "$page" -ge "$total" ] && break
            page=$((page+1))
          done
          echo "purged $deleted _agent.* TXT record(s)"

      - name: Terraform Plan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform plan -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Terraform Apply (auto main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # -parallelism=2 avoids Cloudflare API throttling under burst load.
        # Default is 10, which caused one record to hit context-deadline-exceeded
        # during the initial CF apply. Takes ~15s longer, removes the only flake.
        run: terraform apply -auto-approve -parallelism=2 -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Terraform Apply (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve -parallelism=2 -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"
