name: CI (Rust)
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/aid-rs

      - name: Format check (Rust)
        working-directory: packages/aid-rs
        run: cargo fmt --all -- --check

      - name: Clippy (handshake feature)
        working-directory: packages/aid-rs
        run: cargo clippy --features handshake -- -D warnings

      - name: Clippy (default features)
        working-directory: packages/aid-rs
        run: cargo clippy -- -D warnings

      - name: Build (Rust)
        working-directory: packages/aid-rs
        run: cargo build --locked

      - name: Test (Rust, default features)
        working-directory: packages/aid-rs
        run: cargo test --locked

      - name: Test (Rust, handshake feature)
        working-directory: packages/aid-rs
        run: cargo test --locked --features handshake
