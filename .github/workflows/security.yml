name: Security Scan
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [main, feat/aid1.1-spec, feat/next16-react19-modernization]
  pull_request:
    branches: [main, feat/aid1.1-spec, feat/next16-react19-modernization]

permissions:
  contents: read
  security-events: write
  actions: read

# Cancel superseded runs on the same branch; do not cancel in-progress on main
# (schedule runs on main should always complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 'rust' is NOT included here: CodeQL Rust support is in public preview
        # and the query suites used in codeql-config.yml (security-and-quality,
        # security-experimental) do not yet have GA coverage. Rust security is
        # handled by cargo clippy + cargo test in ci-rust.yml instead.
        language: ['javascript-typescript', 'go', 'python', 'java', 'csharp']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scanning (diff)
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        # Pinned to a specific release tag — do NOT use @main (floating branch =
        # supply-chain risk: any commit to trufflehog's main runs with read access
        # to this repo's checkout). Update the pin periodically or via Dependabot.
        uses: trufflesecurity/trufflehog@v3.90.0
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --debug --only-verified

      - name: Secret scanning (full)
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        uses: trufflesecurity/trufflehog@v3.90.0
        with:
          path: ./
          extra_args: --debug --only-verified

      - name: License compliance check
        run: |
          violations=()
          while IFS= read -r f; do
            if ! head -5 "$f" | grep -qE "MIT|License|Copyright"; then
              violations+=("$f")
            fi
          done < <(find packages \( -name "*.ts" -o -name "*.js" -o -name "*.rs" -o -name "*.go" -o -name "*.cs" -o -name "*.java" \))
          if [ ${#violations[@]} -gt 0 ]; then
            echo "Missing license header in ${#violations[@]} file(s):"
            printf '  %s\n' "${violations[@]}"
            exit 1
          fi
          echo "License headers OK"

      - name: Dependency vulnerability scan
        run: |
          pnpm audit --prod --audit-level critical

      - name: Build JS for CodeQL
        if: ${{ matrix.language == 'javascript-typescript' }}
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm -w build

      - name: CodeQL Analysis (SAST)
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql-config.yml

      - name: Build Java for CodeQL
        if: matrix.language == 'java'
        run: ./gradlew :aid-java:build

      - name: CodeQL Analysis (Autobuild)
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analysis (Results)
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          upload: true

      - name: Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-node-module-generatebom@v1
        with:
          output: ./sbom-${{ matrix.language }}.xml

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.language }}
          path: ./sbom-${{ matrix.language }}.xml
