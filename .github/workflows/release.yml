name: Release (npm OIDC + PyPI OIDC)

# ─── Manual-release runbook for registries without automation ─────────────────
# Rust (crates.io):
#   cd packages/aid-rs
#   cargo publish --token <CRATES_IO_TOKEN>
#
# .NET (NuGet) — note: AidDiscovery.csproj needs <PackageId> and <IsPackable>true</IsPackable>:
#   cd packages/aid-dotnet
#   dotnet pack -c Release -o ./nupkg
#   dotnet nuget push ./nupkg/*.nupkg --api-key <NUGET_TOKEN> --source https://api.nuget.org/v3/index.json
#
# Java (Maven Central) — note: build.gradle needs maven-publish plugin + signing config:
#   ./gradlew :aid-java:publishToMavenCentral
#
# Do NOT add live CI publish jobs for these until each SDK has the required
# package metadata (PackageId/IsPackable for NuGet; maven-publish + signing for
# Maven Central) and credentials are set up as repository secrets.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'packages/**/package.json'
      - 'packages/**/pyproject.toml'
      - 'CHANGELOG.md'
      - '.changeset/**'

jobs:
  publish-npm:
    name: Publish npm packages
    if: contains(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish npm packages
        # Requires npm Trusted Publisher entries for each package:
        # @agentcommunity/aid, @agentcommunity/aid-conformance,
        # @agentcommunity/aid-doctor, @agentcommunity/aid-engine
        run: pnpm changeset publish
        env:
          NPM_CONFIG_PROVENANCE: true

  publish-pypi:
    name: Publish Python package (PyPI)
    if: contains(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python for PyPI publishing
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python package
        run: |
          cd packages/aid-py
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/aid-py/dist/
          # skip-existing: prevents failures when the Python package version has
          # not changed (e.g. an npm-only release). Without this flag, re-uploading
          # an already-published version makes the step — and the whole release —
          # fail after npm packages have already been published.
          skip-existing: true
