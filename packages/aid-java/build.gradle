plugins {
  id 'java-library'
  id 'jacoco'
}

repositories { mavenCentral() }

version = '2.0.0'

java {
  toolchain { languageVersion = JavaLanguageVersion.of(21) }
}

dependencies {
  implementation("com.fasterxml.jackson.core:jackson-databind:2.17.2")
  testImplementation(platform("org.junit:junit-bom:5.10.2"))
  testImplementation("org.junit.jupiter:junit-jupiter")
}

tasks.test {
  useJUnitPlatform()
  testLogging { events "failed", "skipped", "passed" }
  // Wire the applied jacoco plugin into the real test task so coverage is actually produced.
  // Without this, `jacoco` was applied but emitted no report, implying coverage tracking that
  // did not exist. The report (build/reports/jacoco/test/html/index.html and the XML) is now
  // generated whenever tests run. No hard coverage threshold is enforced here because CI runs a
  // filtered subset of the suite; a gate belongs alongside a full-suite CI invocation.
  finalizedBy(tasks.jacocoTestReport)
}

jacocoTestReport {
  dependsOn(tasks.test)
  reports {
    xml.required = true
    html.required = true
  }
}

import org.gradle.api.tasks.compile.JavaCompile
tasks.withType(JavaCompile).configureEach {
  options.encoding = "UTF-8"
  options.release = 21
}
